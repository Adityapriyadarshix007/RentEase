services:
  - type: static
    name: rentease-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://rentease-backend-njvk.onrender.com
